<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Estrategias Didácticas Emergentes - Exposición Grupal Completa</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

:root {
    --bg-dark: #020617;
    --accent-cyan: #22d3ee;
    --accent-blue: #3b82f6;
    --accent-purple: #a855f7;
    --text-main: #f8fafc;
    --text-dim: #94a3b8;
    --glass: rgba(15, 23, 42, 0.85);
    --border: rgba(255, 255, 255, 0.1);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
    background-color: var(--bg-dark);
    color: var(--text-main);
    font-family: 'Rajdhani', sans-serif;
    overflow-x: hidden;
    background-image: 
        radial-gradient(circle at 10% 20%, rgba(34, 211, 238, 0.05) 0%, transparent 20%),
        radial-gradient(circle at 90% 80%, rgba(59, 130, 246, 0.05) 0%, transparent 20%);
}

/* 🔥 ANIMACIÓN SLIDES */
.slide {
    opacity: 0;
    transform: translateY(40px);
    transition: all 0.8s ease;
}

.slide.show {
    opacity: 1;
    transform: translateY(0);
}

.presentation {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 120px;
    padding: 80px 20px;
}

.slide {
    width: 100%;
    max-width: 1100px;
    min-height: 700px;
    background: var(--glass);
    backdrop-filter: blur(16px);
    border: 1px solid var(--border);
    border-radius: 32px;
    padding: 60px;
    position: relative;
    display: flex;
    flex-direction: column;
    justify-content: center;
    box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.6);
}

.tech-line {
    position: absolute;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent-cyan), transparent);
    width: 200px;
    top: 40px;
    left: 60px;
}

h1, h2 { font-family: 'Orbitron', sans-serif; text-transform: uppercase; letter-spacing: 3px; }

.hero-title { font-size: 4rem; margin-bottom: 25px; }
.hero-title span { color: var(--accent-cyan); }

.slide-header { margin-bottom: 45px; border-left: 5px solid var(--accent-cyan); padding-left: 25px; position: relative; }
.slide-header h2 { font-size: 2.2rem; }

.presenter-badge {
    position: absolute;
    right: 0;
    top: 0;
    border: 1px solid var(--accent-cyan);
    color: var(--accent-cyan);
    padding: 8px 20px;
    border-radius: 50px;
}

.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; }
.grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }

/* 🔥 TARJETAS MEJORADAS */
.info-card {
    background: rgba(255, 255, 255, 0.04);
    border: 1px solid var(--border);
    padding: 25px;
    border-radius: 20px;
    transition: all 0.4s;
    position: relative;
    overflow: hidden;
}

.info-card:hover { transform: translateY(-5px); }

.info-card::after {
    content: "";
    position: absolute;
    width: 0%;
    height: 2px;
    bottom: 0;
    left: 0;
    background: var(--accent-cyan);
    transition: 0.4s;
}

.info-card:hover::after {
    width: 100%;
}

/* 🔥 IMÁGENES (CORREGIDO) */
.image-container {
    width: 100%;
    height: 400px;
    border-radius: 24px;
    overflow: hidden;
}

.image-container img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    opacity: 0.9;
    transition: transform 0.5s ease;
}

.image-container:hover img {
    transform: scale(1.1);
}

/* 🔥 BOTONES */
.btn-pro {
    display: inline-block;
    margin-top: 15px;
    padding: 10px 20px;
    border-radius: 10px;
    border: 1px solid var(--accent-cyan);
    color: var(--accent-cyan);
    text-decoration: none;
    font-family: 'Orbitron', sans-serif;
    transition: 0.3s;
}

.btn-pro:hover {
    background: var(--accent-cyan);
    color: var(--bg-dark);
    box-shadow: 0 0 15px var(--accent-cyan);
}

</style>
</head>

<body>

<div class="presentation">

<div class="slide">
    <h1 class="hero-title">ESTRATEGIAS <span>DIDÁCTICAS</span></h1>
</div>

<div class="slide">
    <div class="grid-2">
        <div class="image-container">
            <img src="https://images.unsplash.com/photo-1581092160562-40aa08e78837" alt="">
        </div>
        <div>
            <p>Ejemplo con imagen funcionando correctamente.</p>
            <a href="#" class="btn-pro">Ver más</a>
        </div>
    </div>
</div>

</div>

<script>
const slides = document.querySelectorAll('.slide');

const observer = new IntersectionObserver(entries => {
    entries.forEach(entry => {
        if (entry.isIntersecting) {
            entry.target.classList.add('show');
        }
    });
}, { threshold: 0.2 });

slides.forEach(slide => observer.observe(slide));
</script>

</body>
</html>

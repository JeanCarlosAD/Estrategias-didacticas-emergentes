<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Estrategias Didácticas Emergentes</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<!-- AOS -->
<link rel="stylesheet" href="https://unpkg.com/aos@2.3.1/dist/aos.css"/>

<style>

:root {
--bg-dark: #020617;
--accent-cyan: #22d3ee;
--accent-blue: #3b82f6;
--accent-purple: #a855f7;
--text-main: #f8fafc;
--text-dim: #94a3b8;
--glass: rgba(15, 23, 42, 0.85);
--border: rgba(255,255,255,0.1);
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
background:var(--bg-dark);
color:var(--text-main);
font-family:'Rajdhani',sans-serif;
overflow-x:hidden;
animation:fadeBody 1s ease;
}

@keyframes fadeBody{
from{opacity:0;}
to{opacity:1;}
}

.presentation{
display:flex;
flex-direction:column;
align-items:center;
gap:120px;
padding:80px 20px;
}

.slide{
width:100%;
max-width:1100px;
min-height:700px;
background:var(--glass);
backdrop-filter:blur(16px);
border:1px solid var(--border);
border-radius:32px;
padding:60px;
display:flex;
flex-direction:column;
justify-content:center;
box-shadow:0 30px 60px rgba(0,0,0,0.6);
transition:all .4s;
}

.slide:hover{
transform:scale(1.01);
}

.tech-line{
height:2px;
background:linear-gradient(90deg,transparent,var(--accent-cyan),transparent);
width:200px;
margin-bottom:20px;
animation:lineGlow 2s infinite alternate;
}

@keyframes lineGlow{
from{opacity:.4;}
to{opacity:1;}
}

h1,h2{
font-family:'Orbitron';
letter-spacing:3px;
}

.hero-title{
font-size:4rem;
margin-bottom:20px;
}

.hero-title span{
color:var(--accent-cyan);
animation:glow 2s infinite alternate;
}

@keyframes glow{
from{text-shadow:0 0 10px rgba(34,211,238,.3);}
to{text-shadow:0 0 30px rgba(34,211,238,.9);}
}

.slide-header{
margin-bottom:40px;
border-left:5px solid var(--accent-cyan);
padding-left:20px;
}

.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:40px;}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;}

.info-card{
background:rgba(255,255,255,.04);
border:1px solid var(--border);
padding:25px;
border-radius:20px;
transition:all .4s;
}

.info-card:hover{
transform:translateY(-8px) scale(1.02);
border-color:var(--accent-cyan);
box-shadow:0 15px 30px rgba(34,211,238,.2);
}

.info-card i{
font-size:2rem;
color:var(--accent-cyan);
margin-bottom:10px;
}

.highlight-box{
background:linear-gradient(135deg,rgba(34,211,238,.12),rgba(59,130,246,.08));
padding:20px;
border-left:4px solid var(--accent-cyan);
border-radius:15px;
}

.image-container img{
width:100%;
border-radius:20px;
transition:.4s;
}

.image-container img:hover{
transform:scale(1.05);
}

.footer-note{
margin-top:20px;
color:var(--accent-cyan);
font-style:italic;
}

@media(max-width:900px){
.grid-2,.grid-3{grid-template-columns:1fr;}
.hero-title{font-size:2.5rem;}
}

</style>
</head>

<body>

<div class="presentation">

<div class="slide" data-aos="fade-up">
<div class="tech-line"></div>
<div class="hero-title">ESTRATEGIAS <span>DIDÁCTICAS</span></div>
<p>Tecnología e Informática</p>
</div>

<div class="slide" data-aos="fade-right">
<h2>Concepto</h2>
<p>Las estrategias didácticas emergentes son métodos modernos adaptados a la tecnología.</p>
</div>

<div class="slide" data-aos="zoom-in">
<h2>Características</h2>
<div class="grid-3">
<div class="info-card"><i class="fa-solid fa-layer-group"></i>Flexibles</div>
<div class="info-card"><i class="fa-solid fa-wand-magic"></i>Creativas</div>
<div class="info-card"><i class="fa-solid fa-laptop-code"></i>Tecnológicas</div>
</div>
</div>

</div>

<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
<script>
AOS.init({duration:1000,once:true});
</script>

</body>
</html>
